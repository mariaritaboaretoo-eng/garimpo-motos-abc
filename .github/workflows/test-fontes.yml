name: Testar fontes (datacenter)

on:
  workflow_dispatch: {}

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests curl_cffi
      - run: python scripts/test_fontes.py
