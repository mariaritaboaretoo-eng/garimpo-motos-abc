name: Garimpo de Motos

# Roda na nuvem do GitHub - nao precisa de PC ligado.
on:
  schedule:
    - cron: "0 12 * * *"   # 09:00 BRT (12:00 UTC): pagina + EMAIL
    - cron: "0 15 * * *"   # 12:00 BRT (15:00 UTC): so atualiza a pagina
  workflow_dispatch: {}     # botao de rodar na mao (aba Actions) -> pagina + email

permissions:
  contents: write           # deixa o robo salvar a pagina atualizada de volta no repo

jobs:
  garimpar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar navegador (Playwright/Chromium)
        run: python -m playwright install --with-deps chromium

      - name: Rodar o garimpo (busca + FIPE + pagina [+ email as 09h])
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_PARA: ${{ secrets.EMAIL_PARA }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            python src/garimpo.py --pagina      # almoco: so pagina, sem email
          else
            python src/garimpo.py --notificar   # manha e manual: pagina + email
          fi

      - name: Publicar a pagina atualizada
        run: |
          git config user.name  "garimpo-bot"
          git config user.email "garimpo-bot@users.noreply.github.com"
          git add docs/
          git commit -m "atualiza pagina do garimpo" || echo "nada mudou"
          git push
